name: Deploy to Hugging Face

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./beginner/tool-calling-agent/backend  # ← Apna path

    steps:
    - name: Get code
      uses: actions/checkout@v4

    - name: Deploy
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_USERNAME: ${{ secrets.HF_USERNAME }}
        HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
      run: |
        # Setup git identity
        git config --global user.email "bot@github.com"
        git config --global user.name "Bot"
        
        # Create a temporary deployment folder
        mkdir -p deploy_hf
        cp main.py agent.py pyproject.toml uv.lock Dockerfile deploy_hf/ 2>/dev/null || true
        
        cd deploy_hf
        git init -b main
        git add .
        git commit -m "Deploy from GitHub Actions" || echo "No changes to commit"
        
        # Push to Hugging Face (Force push to overwrite the Space content)
        git push -f https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main